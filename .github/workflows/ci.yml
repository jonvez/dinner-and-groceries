name: CI

# PR checks gate merges (lint + typecheck + Vitest, plus a Playwright smoke E2E).
# On merge to main, a guarded Cloud Run deploy runs (no-op only while GCP wiring
# vars are unset). See docs: docs/ci.md.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # PR gate: lint + typecheck + unit tests. Any non-zero exit blocks merge.
  # ---------------------------------------------------------------------------
  verify:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

  # ---------------------------------------------------------------------------
  # PR gate: RLS (pgTAP) against a real ephemeral Supabase Postgres.
  # The identity household-scoping RLS (and every later slice's RLS that builds
  # on it) is the security bedrock — it can only be verified against a live
  # Postgres with multiple authenticated user contexts, which the unit `verify`
  # job (jsdom, no Docker) cannot do. This job boots the local stack and runs
  # `supabase test db` (pgTAP allow-same / deny-cross / role / invite-integrity
  # tests in supabase/tests/). Skips cleanly until migrations exist.
  # ---------------------------------------------------------------------------
  rls:
    name: RLS pgTAP (Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Google OAuth provider is enabled in supabase/config.toml (issue #5)
      # and reads its client_id/secret via env(). The RLS tests never exercise
      # the OAuth flow, but GoTrue wants the vars present at boot, so we pass
      # harmless non-secret placeholders here. Real Google creds are a human/
      # Secret-Manager concern (see README "Google OAuth setup").
      - name: Start local Supabase stack
        run: npx supabase start
        env:
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ci-placeholder.apps.googleusercontent.com
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ci-placeholder-secret

      - name: Apply migrations (clean reset)
        run: npx supabase db reset --local

      # `supabase test db` pulls pg_prove from public.ecr.aws on demand; that pull
      # occasionally times out and would fail this (required) check on a transient
      # registry hiccup. Warm the image with retries first so the test step finds it
      # cached. Best-effort: if all retries fail (sustained outage), the test step's
      # own pull is the final arbiter and fails the job legitimately.
      - name: Pre-pull pgTAP image (resilient to transient registry hiccups)
        run: |
          for i in 1 2 3; do
            if docker pull public.ecr.aws/supabase/pg_prove:3.36; then break; fi
            echo "pg_prove image pull attempt $i failed; retrying in 10s..."
            sleep 10
          done

      - name: Run pgTAP RLS tests
        run: npx supabase test db --local

      - name: Stop local Supabase stack
        if: ${{ always() }}
        run: npx supabase stop --no-backup

  # ---------------------------------------------------------------------------
  # PR gate: Playwright E2E against the production standalone server, now backed
  # by a real ephemeral local Supabase (issues #56 + #24). Two tiers run:
  #   * smoke   — the signed-out path (/ -> /login), no session.
  #   * authed  — the AUTHENTICATED loop: authed SSR + RLS board render,
  #               propose/react/comment, and a TWO-CONTEXT live Realtime guard
  #               that asserts reaction INSERT delivery AND DELETE (un-react)
  #               propagation between two members of one household (the automated
  #               guard for the #63 class). Sessions are seeded directly against
  #               local Supabase (email/password) — NO Google OAuth, and NO
  #               service-role key (ADR 0003 stays intact): local email
  #               confirmations are disabled so signUp returns a live session, and
  #               the household is built via the app's own authenticated RPCs.
  #
  # Ordering matters: NEXT_PUBLIC_* are inlined into the CLIENT bundle at BUILD
  # time (this repo has been bitten by this repeatedly). So we boot Supabase and
  # export its URL/anon key into $GITHUB_ENV BEFORE `npm run build`, then verify
  # the built bundle actually points at the local stack.
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright smoke E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GoTrue wants the Google OAuth env present at boot (config.toml references
      # it via env()); the E2E flows never touch Google — sessions are seeded via
      # email/password — so harmless non-secret placeholders suffice (same pattern
      # as the rls job).
      - name: Start ephemeral Supabase
        run: npx supabase start
        env:
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ci-placeholder.apps.googleusercontent.com
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ci-placeholder-secret

      # Feed the RUNNING stack's URL + anon key to every later step (build inline,
      # standalone server runtime, and the seed's signUp) via $GITHUB_ENV — the
      # single source of truth, so the build can't drift from the stack the tests
      # run against. The service-role key is deliberately NOT exported (ADR 0003).
      - name: Export local Supabase env
        run: |
          eval "$(npx supabase status -o env)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
          } >> "$GITHUB_ENV"

      - name: Apply migrations (clean reset)
        run: npx supabase db reset --local

      # NEXT_PUBLIC_* come from $GITHUB_ENV above (the running stack), so the
      # client bundle is inlined pointing at the ephemeral local Supabase.
      - name: Build (standalone)
        run: npm run build

      # Guard against the exact class of bug this task exists to prevent: if the
      # public env wasn't inlined at build time, the browser Supabase client (and
      # the Realtime socket) would have no backend and the authed flows would fail
      # in confusing ways. Assert the URL is actually baked into a client chunk.
      - name: Verify local Supabase URL is inlined into the client bundle
        run: |
          if ! grep -rqF "$NEXT_PUBLIC_SUPABASE_URL" .next/static/chunks; then
            echo "::error::Client bundle does not point at local Supabase — NEXT_PUBLIC_* was not inlined at build time."
            exit 1
          fi
          echo "Client bundle correctly points at $NEXT_PUBLIC_SUPABASE_URL"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # The Playwright "setup" project seeds two users + one household against the
      # running stack and writes their storageState; the authed projects then run.
      - name: Run E2E (smoke + authed + live Realtime guard)
        run: npm run test:e2e

      - name: Stop ephemeral Supabase
        if: ${{ always() }}
        run: npx supabase stop --no-backup

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Deploy: Docker build -> Artifact Registry -> Cloud Run (ADR 0009).
  # Guarded to merges on main; no-op only while GCP wiring vars are unset, so it
  # never runs on PRs and commits no real GCP credentials.
  # Auth is via Workload Identity Federation (no long-lived keys). NEXT_PUBLIC_*
  # are read from GCP Secret Manager and injected as Docker BUILD args (Next.js
  # inlines them into the client bundle at build time). The Cloud Run service is
  # --allow-unauthenticated (app enforces auth via Supabase) with --min-instances 0.
  # See docs/ci.md for the variables/secrets this expects.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    needs: [verify, e2e]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation
    steps:
      - name: Gate on GCP wiring
        id: gate
        run: |
          if [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GCP not wired yet (vars.GCP_PROJECT_ID unset) — deploy is a no-op stub."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.gate.outputs.enabled == 'true' }}

      # Keyless auth via Workload Identity Federation — no JSON keys in the repo.
      - name: Authenticate to Google Cloud
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      # NEXT_PUBLIC_* are needed in TWO places: (1) the CLIENT bundle, where
      # `next build` inlines the *static* `process.env.NEXT_PUBLIC_*` references
      # at BUILD time (so they must be Docker build-args, fetched here); and
      # (2) the SERVER at RUNTIME — middleware.ts / server-component.ts call
      # readSupabaseEnv() which reads process.env *dynamically*, and dynamic
      # reads are NOT inlined by the build, so the running container must carry
      # them in its env (bound from Secret Manager on the deploy step below).
      # BOTH are required: build-args only ⇒ SSR 500s on every request;
      # runtime-only ⇒ the browser sign-in client throws. Secret Manager is the
      # single source of truth; the deploy SA (authed above) reads the two public,
      # non-secret values here for the build. The service-role key is NEVER
      # fetched or built in. Requires the deploy SA to hold
      # secretmanager.secretAccessor on both secrets — runbook § P3.
      - name: Fetch build-time NEXT_PUBLIC_* from Secret Manager
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_SUPABASE_URL --project=${{ vars.GCP_PROJECT_ID }})"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_SUPABASE_ANON_KEY --project=${{ vars.GCP_PROJECT_ID }})"
          } >> "$GITHUB_ENV"

      - name: Build & push image to Artifact Registry
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/dinner-and-groceries:${{ github.sha }}
          # Public (non-secret) build-time values, inlined by `next build`.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloud Run
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.1
        with:
          service: dinner-and-groceries
          region: ${{ vars.GCP_REGION }}
          image: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/dinner-and-groceries:${{ github.sha }}
          # ADR 0009: the app enforces auth via Supabase (Cloud Run IAM is NOT the
          # auth boundary), so the service is public; scale-to-zero for cost.
          flags: --allow-unauthenticated --min-instances=0
          # Runtime env for the SERVER path: middleware/server-component read
          # NEXT_PUBLIC_* from process.env dynamically at runtime (NOT inlined),
          # so bind them from Secret Manager into the running service. (The client
          # bundle already got them at BUILD time via build-args above.) The
          # runtime compute SA holds secretAccessor on these — runbook § P1.6. The
          # service-role key is never bound anywhere (RLS-always, ADR 0003).
          secrets: |
            NEXT_PUBLIC_SUPABASE_URL=NEXT_PUBLIC_SUPABASE_URL:latest
            NEXT_PUBLIC_SUPABASE_ANON_KEY=NEXT_PUBLIC_SUPABASE_ANON_KEY:latest

      - name: Stub notice (GCP not wired)
        if: ${{ steps.gate.outputs.enabled != 'true' }}
        run: |
          echo "Deploy stub: pipeline shape present; wire vars.GCP_* + WIF to activate."
